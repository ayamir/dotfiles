# light
set -g status-justify "centre"
set -g status "on"
set -g status-left-style "none"
set -g message-command-style "fg=#4b505b,bg=#f7ede2"
set -g status-right-style "none"
set -g pane-active-border-style "fg=#5695d1"
set -g status-style "none,bg=#fff7ec"
set -g message-style "fg=#4b505b,bg=#f7ede2"
set -g pane-border-style "fg=#f7ede2"
set -g status-right-length "100"
set -g status-left-length "100"
setw -g window-status-activity-style "none,fg=#5695d1,bg=#fff7ec"
setw -g window-status-separator ""
setw -g window-status-style "none,fg=#4b505b,bg=#fff7ec"
set -g status-left "#[fg=#fafafa,bg=#5695d1] #S #[fg=#5695d1,bg=#f7ede2,nobold,nounderscore,noitalics]#[fg=#4b505b,bg=#f7ede2] %R #[fg=#f7ede2,bg=#fff7ec,nobold,nounderscore,noitalics]#[fg=#fff7ec,bg=#fff7ec,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#fff7ec,bg=#fff7ec,nobold,nounderscore,noitalics]#[fg=#4b505b,bg=#fff7ec]  #{network_speed} #[fg=#f7ede2,bg=#fff7ec,nobold,nounderscore,noitalics]#[fg=#4b505b,bg=#f7ede2] %a #[fg=#5695d1,bg=#f7ede2,nobold,nounderscore,noitalics]#[fg=#fafafa,bg=#5695d1] #H #{prefix_highlight} "
setw -g window-status-format "#[fg=#fff7ec,bg=#fff7ec,nobold,nounderscore,noitalics]#[fg=#4b505b] #I  #W #[fg=#fff7ec,bg=#fff7ec,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#fff7ec,bg=#f7ede2,nobold,nounderscore,noitalics]#[fg=#4b505b,bg=#f7ede2] #I  #W  #F #[fg=#f7ede2,bg=#fff7ec,nobold,nounderscore,noitalics]"
