# dark
set -g status-justify "centre"
set -g status "on"
set -g status-left-style "none"
set -g message-command-style "fg=#cdd6f4,bg=#313244"
set -g status-right-style "none"
set -g pane-active-border-style "fg=#f38ba8"
set -g status-style "none,bg=#1e1e2e"
set -g message-style "fg=#cdd6f4,bg=#313244"
set -g pane-border-style "fg=#313244"
set -g status-right-length "100"
set -g status-left-length "100"
setw -g window-status-activity-style "none,fg=#f38ba8,bg=#1e1e2e"
setw -g window-status-separator ""
setw -g window-status-style "none,fg=#cdd6f4,bg=#1e1e2e"
set -g status-left "#[fg=#fafafa,bg=#f38ba8] #S #[fg=#f38ba8,bg=#313244,nobold,nounderscore,noitalics]#[fg=#cdd6f4,bg=#313244] %R #[fg=#313244,bg=#1e1e2e,nobold,nounderscore,noitalics]#[fg=#1e1e2e,bg=#1e1e2e,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#1e1e2e,bg=#1e1e2e,nobold,nounderscore,noitalics]#[fg=#cdd6f4,bg=#1e1e2e]  #{network_speed} #[fg=#313244,bg=#1e1e2e,nobold,nounderscore,noitalics]#[fg=#cdd6f4,bg=#313244] %a #[fg=#f38ba8,bg=#313244,nobold,nounderscore,noitalics]#[fg=#fafafa,bg=#f38ba8] #H #{prefix_highlight} "
setw -g window-status-format "#[fg=#1e1e2e,bg=#1e1e2e,nobold,nounderscore,noitalics]#[fg=#cdd6f4] #I  #W #[fg=#1e1e2e,bg=#1e1e2e,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#313244,nobold,nounderscore,noitalics]#[fg=#cdd6f4,bg=#313244] #I  #W  #F #[fg=#313244,bg=#1e1e2e,nobold,nounderscore,noitalics]"
