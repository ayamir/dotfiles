# dark
set -g status-justify "centre"
set -g status "on"
set -g status-left-style "none"
set -g message-command-style "fg=#d3c6aa,bg=#3b454c"
set -g status-right-style "none"
set -g pane-active-border-style "fg=#e67e80"
set -g status-style "none,bg=#2c363d"
set -g message-style "fg=#d3c6aa,bg=#3b454c"
set -g pane-border-style "fg=#3b454c"
set -g status-right-length "100"
set -g status-left-length "100"
setw -g window-status-activity-style "none,fg=#e67e80,bg=#2c363d"
setw -g window-status-separator ""
setw -g window-status-style "none,fg=#d3c6aa,bg=#2c363d"
set -g status-left "#[fg=#1e2326,bg=#e67e80] #S #[fg=#e67e80,bg=#3b454c,nobold,nounderscore,noitalics]#[fg=#d3c6aa,bg=#3b454c] %R #[fg=#3b454c,bg=#2c363d,nobold,nounderscore,noitalics]#[fg=#2c363d,bg=#2c363d,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#2c363d,bg=#2c363d,nobold,nounderscore,noitalics]#[fg=#d3c6aa,bg=#2c363d]  #{network_speed} #[fg=#3b454c,bg=#2c363d,nobold,nounderscore,noitalics]#[fg=#d3c6aa,bg=#3b454c] %a #[fg=#e67e80,bg=#3b454c,nobold,nounderscore,noitalics]#[fg=#1e2326,bg=#e67e80] #H #{prefix_highlight} "
setw -g window-status-format "#[fg=#2c363d,bg=#2c363d,nobold,nounderscore,noitalics]#[fg=#d3c6aa] #I  #W #[fg=#2c363d,bg=#2c363d,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#2c363d,bg=#3b454c,nobold,nounderscore,noitalics]#[fg=#d3c6aa,bg=#3b454c] #I  #W  #F #[fg=#3b454c,bg=#2c363d,nobold,nounderscore,noitalics]"
